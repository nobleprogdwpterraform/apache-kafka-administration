services:
  kafka-1:
    image: apache/kafka:3.8.0
    container_name: kafka-1
    ports:
      - "9092:9092"
      - "19999:9999"
    environment:
      CLUSTER_ID: "WnLkTHhkQaiJbwP8FClPhw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9091, 2@kafka-2:9091, 3@kafka-3:9091
      KAFKA_LISTENERS: PLAINTEXT://:9090,CONTROLLER://:9091,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9090,EXTERNAL://${HOSTNAME:-localhost}:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_JMX_HOSTNAME: kafka-1
      KAFKA_JMX_PORT: 9999
      JMX_PORT: 9999
      
    networks: [ps-kafka-m2-demo2-net]
    restart: unless-stopped

  kafka-2:
    image: apache/kafka:3.8.0
    container_name: kafka-2
    ports:
      - "9094:9094"
      - "29999:9999"
    environment:
      CLUSTER_ID: "WnLkTHhkQaiJbwP8FClPhw"
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9091, 2@kafka-2:9091, 3@kafka-3:9091
      KAFKA_LISTENERS: PLAINTEXT://:9090,CONTROLLER://:9091,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9090,EXTERNAL://${HOSTNAME:-localhost}:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_JMX_HOSTNAME: kafka-2
      KAFKA_JMX_PORT: 9999
      JMX_PORT: 9999
      
    networks: [ps-kafka-m2-demo2-net]
    restart: unless-stopped

  kafka-3:
    image: apache/kafka:3.8.0
    container_name: kafka-3
    ports:
      - "9096:9096"
      - "39999:9999"
    environment:
      CLUSTER_ID: "WnLkTHhkQaiJbwP8FClPhw"
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9091, 2@kafka-2:9091, 3@kafka-3:9091
      KAFKA_LISTENERS: PLAINTEXT://:9090,CONTROLLER://:9091,EXTERNAL://:9096
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9090,EXTERNAL://${HOSTNAME:-localhost}:9096
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_JMX_HOSTNAME: kafka-3
      KAFKA_JMX_PORT: 9999
      JMX_PORT: 9999
      
    networks: [ps-kafka-m2-demo2-net]
    restart: unless-stopped

  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: kafdrop
    restart: always
    ports:
        - "9000:9000"
    depends_on:
        - "kafka-1"
        - "kafka-2"
        - "kafka-3"
    environment:
        SERVER_SERVLET_CONTEXTPATH: "/"
        KAFKA_BROKERCONNECT: "kafka-1:9090,kafka-2:9090,kafka-3:9090"

    image: confluentinc/cp-kafka:7.5.0
    container_name: broker3
    depends_on: [zookeeper]
    ports:
      - "39092:9092"
      - "39999:9999"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_JMX_HOSTNAME: broker3
      KAFKA_JMX_PORT: 9999
      JMX_PORT: 9999
    networks: [ps-kafka-m2-demo2-net]
    restart: unless-stopped

  jmx-exporter-broker1:
    image: bitnami/jmx-exporter:latest
    container_name: jmx-exporter-broker1
    command: ["5556", "/etc/jmx-exporter/kafka-broker.yml"]
    volumes:
      - ./jmx-exporter/kafka-broker-broker1.yml:/etc/jmx-exporter/kafka-broker.yml:ro
    ports:
      - "5556:5556"
    depends_on: [broker1]
    networks: [ps-kafka-m2-demo2-net]
    restart: unless-stopped

  jmx-exporter-broker2:
    image: bitnami/jmx-exporter:latest
    container_name: jmx-exporter-broker2
    command: ["5556", "/etc/jmx-exporter/kafka-broker.yml"]
    volumes:
      - ./jmx-exporter/kafka-broker-broker2.yml:/etc/jmx-exporter/kafka-broker.yml:ro
    ports:
      - "5557:5556"
    depends_on: [broker2]
    networks: [ps-kafka-m2-demo2-net]
    restart: unless-stopped

  jmx-exporter-broker3:
    image: bitnami/jmx-exporter:latest
    container_name: jmx-exporter-broker3
    command: ["5556", "/etc/jmx-exporter/kafka-broker.yml"]
    volumes:
      - ./jmx-exporter/kafka-broker-broker3.yml:/etc/jmx-exporter/kafka-broker.yml:ro
    ports:
      - "5558:5556"
    depends_on: [broker3]
    networks: [ps-kafka-m2-demo2-net]
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command:
      - "--kafka.server=broker1:9092"
      - "--kafka.server=broker2:9092"
      - "--kafka.server=broker3:9092"
      - "--group.filter=ops-demo-cg"
      - "--topic.filter=ops-demo-observability"
    ports:
      - "9308:9308"
    depends_on: [broker1, broker2, broker3]
    networks: [ps-kafka-m2-demo2-net]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9093:9093"
    depends_on:
      - jmx-exporter-broker1
      - jmx-exporter-broker2
      - jmx-exporter-broker3
      - kafka-exporter
    networks: [ps-kafka-m2-demo2-net]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    networks: [ps-kafka-m2-demo2-net]
    restart: unless-stopped

networks:
  ps-kafka-m2-demo2-net:
    name: ps-kafka-m2-demo2-net
