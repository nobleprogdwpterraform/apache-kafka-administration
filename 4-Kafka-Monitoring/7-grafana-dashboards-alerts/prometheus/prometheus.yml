global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "kafka-jmx"
    static_configs:
      - targets:
          - jmx-exporter-broker1:5556
          - jmx-exporter-broker2:5556
          - jmx-exporter-broker3:5556

  - job_name: "kafka-exporter"
    static_configs:
      - targets:
          - kafka-exporter:9308
